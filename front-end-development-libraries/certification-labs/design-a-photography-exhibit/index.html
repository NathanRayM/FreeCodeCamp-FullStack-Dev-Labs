<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-purple-600">
    <h1 class="text-center font-bold text-4xl text-yellow-300">
      Photography Exhibit
    </h1>
    <main class="main-container grid grid-cols-1 md:grid-cols-3 gap-8 p-5">
      <!--Card One-->
      <div
        class="card rounded-md border border-yellow-300 p-4 bg-purple-800 flex flex-col gap-3"
      >
        <img
          class="rounded-md h-full"
          src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg"
          alt="The Rome Colosseum"
        />
        <h2 class="subheading text-2xl font-semibold text-yellow-300">
          Colosseum, Rome
        </h2>
        <p class="description text-yellow-300 text-sm">
          There is so much history and beauty. The light hits it just right.
        </p>
        <div class="button-container flex gap-4">
          <button
            class="px-7 py-3 bg-purple-700 hover:bg-purple-600 border border-yellow-300 text-yellow-300 font-semibold rounded"
          >
            Like
          </button>
          <button
            class="px-7 py-3 bg-yellow-300 border border-yellow-300 text-purple-800 font-semibold rounded"
          >
            View Details
          </button>
        </div>
      </div>

      <!--Card Two-->
      <div
        class="card rounded-md border border-yellow-300 p-4 bg-purple-800 flex flex-col gap-3"
      >
        <img
          class="rounded-md h-full"
          src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg"
          alt="The Alps"
        />
        <h2 class="subheading text-2xl font-semibold text-yellow-300">
          The Alps
        </h2>
        <p class="description text-yellow-300 text-sm">
          The mountains go on forever and the view is breathtaking.
        </p>
        <div class="button-container flex gap-4">
          <button
            class="px-7 py-3 bg-purple-700 hover:bg-purple-600 border border-yellow-300 text-yellow-300 font-semibold rounded"
          >
            Like
          </button>
          <button
            class="px-7 py-3 bg-yellow-300 border border-yellow-300 text-purple-800 font-semibold rounded"
          >
            View Details
          </button>
        </div>
      </div>

      <!--Card Three-->
      <div
        class="card rounded-md border border-yellow-300 p-4 bg-purple-800 flex flex-col gap-3"
      >
        <img
          class="rounded-md h-full"
          src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg"
          alt="Seascape"
        />
        <h2 class="subheading text-2xl font-semibold text-yellow-300">
          Seascape
        </h2>
        <p class="description text-yellow-300 text-sm">
          The water was still, the air was cool and the feeling is pure peace.
        </p>
        <div class="button-container flex gap-4">
          <button
            class="px-7 py-3 bg-purple-700 hover:bg-purple-600 border border-yellow-300 text-yellow-300 font-semibold rounded"
          >
            Like
          </button>
          <button
            class="px-7 py-3 bg-yellow-300 border border-yellow-300 text-purple-800 font-semibold rounded"
          >
            View Details
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
